name: Reindex Production Database

# NOTE: This workflow re-indexes IRE's production Qdrant database.
# Fork maintainers: update for your own Fly.io app.

on:
  workflow_dispatch:
    inputs:
      clear_db:
        description: "Clear Qdrant collection before indexing?"
        required: true
        default: true
        type: boolean

concurrency:
  group: prod-backend-ops
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  reindex:
    name: Reindex Production Database
    runs-on: ubuntu-latest
    timeout-minutes: 90
    environment:
      name: production-backend
      url: https://api.archive.ire.org

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"

      - name: Install dependencies
        run: uv sync --locked

      - name: Set up Fly.io CLI
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Reindex production database
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          set -euo pipefail
          FLAG="--clear-db"
          if [ "${{ inputs.clear_db }}" != "true" ]; then
            FLAG="--no-clear-db"
          fi
          uv run python -m scripts.prod_tasks index --yes "$FLAG"
