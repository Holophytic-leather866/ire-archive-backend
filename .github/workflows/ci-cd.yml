name: Continuous Integration and Deployment

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Allow only one concurrent deployment
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Required for paths-filter and Codecov
permissions:
  contents: read
  pull-requests: read

jobs:
  # Detect which parts of the codebase changed
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Check for file changes
        uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            backend:
              - 'app/**'
              - 'scripts/**'
              - 'tests/**'
              - 'pyproject.toml'
              - 'uv.lock'
              - 'docker/Dockerfile'
              - 'docker/Dockerfile.base'
              - 'fly.toml'
              - 'docker/docker-compose.yml'
              - 'docker/supervisord.conf'
              - 'docker/entrypoint.sh'
              - 'docker/config/qdrant.yaml'

  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"

      - name: Install dependencies
        run: uv sync --extra test

      - name: Run backend tests with coverage
        run: uv run pytest tests/ -v --tb=short --cov=app --cov=scripts --cov-report=xml --cov-report=html

      - name: Upload coverage reports
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          flags: backend
          name: backend-coverage
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'

  lint-python:
    name: Lint Python code
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    steps:
      - id: checkout
        name: Checkout
        uses: actions/checkout@v6

      - id: check-ruff
        name: Check with Ruff
        uses: astral-sh/ruff-action@v3
        with:
          args: "check --exit-zero --verbose"

      - id: format-ruff
        name: Format with Ruff
        uses: astral-sh/ruff-action@v3
        with:
          args: "format --check --verbose"

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"

      - name: Install dependencies
        run: uv sync --extra test --extra mypy

      - name: Run mypy
        run: uv run mypy .

  # --------------------------------------------------------------------------
  # NOTE: This job deploys to IRE's production Fly.io instance.
  # Fork maintainers: update the app name below and the verification URL,
  # then add FLY_API_TOKEN to your repo's Settings → Secrets → Actions.
  # --------------------------------------------------------------------------
  deploy-backend:
    name: Deploy backend to Fly.io
    runs-on: ubuntu-latest
    needs: [changes, backend-tests, lint-python, type-check]
    if: |
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      needs.changes.outputs.backend == 'true' &&
      !contains(github.event.head_commit.message, '[skip deploy]')
    environment:
      name: production-backend
      url: https://api.archive.ire.org
    concurrency:
      group: prod-backend-ops
      cancel-in-progress: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Fly.io CLI
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        run: flyctl deploy --remote-only --app ire-semantic-search
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Verify deployment
        run: |
          echo "Waiting 30s for deployment to stabilize..."
          sleep 30
          curl -f https://api.archive.ire.org/ || exit 1
          echo "✅ Backend deployment verified!"
