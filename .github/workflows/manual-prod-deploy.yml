name: Manual Backend Deploy

# NOTE: This workflow deploys to IRE's production Fly.io instance.
# Fork maintainers: update the app name and verification URL below,
# then add FLY_API_TOKEN to your repo's Settings → Secrets → Actions.

on:
  workflow_dispatch:

concurrency:
  group: prod-backend-ops
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: Manual Backend Deploy
    runs-on: ubuntu-latest
    environment:
      name: production-backend
      url: https://api.archive.ire.org
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Fly.io CLI
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        run: flyctl deploy --remote-only --app ire-semantic-search
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Verify deployment
        run: |
          echo "Waiting 30s for deployment to stabilize..."
          sleep 30
          curl -f https://api.archive.ire.org/ || exit 1
          echo "✅ Backend deployment verified!"
