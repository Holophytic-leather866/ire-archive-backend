[supervisord]
nodaemon=true
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid
childlogdir=/var/log/supervisor

[program:qdrant]
command=/usr/local/bin/qdrant --storage-dir /data/qdrant_storage --http-port 6333 --grpc-port 6334 --log-level INFO
autostart=true
autorestart=true
stderr_logfile=/var/log/supervisor/qdrant.err.log
stdout_logfile=/var/log/supervisor/qdrant.out.log
priority=1

[program:api]
command=uvicorn app.main:app --host 0.0.0.0 --port %(ENV_PORT)s --workers 1 --log-level %(ENV_LOG_LEVEL)s
directory=/app
autostart=true
autorestart=true
startsecs=10
startretries=3
stderr_logfile=/var/log/supervisor/api.err.log
stdout_logfile=/var/log/supervisor/api.out.log
priority=2
environment=PYTHONUNBUFFERED="1"

[unix_http_server]
file=/var/run/supervisor.sock
chmod=0700

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

[supervisorctl]
serverurl=unix:///var/run/supervisor.sock
